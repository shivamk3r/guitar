services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:7654
    ports:
      - "7653:7653"
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - /workspace/apps/frontend/node_modules
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 7654 --reload
    environment:
      DATABASE_URL: postgresql+psycopg://guitar:guitar@postgres:5432/guitar
      CORS_ALLOWED_ORIGINS: http://localhost:7653
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_BUCKET: guitar-recordings
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      SQS_QUEUE_URL: http://localstack:4566/000000000000/guitar-analysis
    ports:
      - "7654:7654"
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      localstack:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: python -m app.worker
    environment:
      DATABASE_URL: postgresql+psycopg://guitar:guitar@postgres:5432/guitar
      OBJECT_STORAGE_ENDPOINT_URL: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: minioadmin
      OBJECT_STORAGE_SECRET_KEY: minioadmin
      OBJECT_STORAGE_BUCKET: guitar-recordings
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_REGION: us-east-1
      SQS_QUEUE_URL: http://localstack:4566/000000000000/guitar-analysis
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      localstack:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: guitar
      POSTGRES_USER: guitar
      POSTGRES_PASSWORD: guitar
    ports:
      - "7655:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guitar -d guitar"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "7656:9000"
      - "7657:9001"
    volumes:
      - minio-data:/data

  localstack:
    image: localstack/localstack:3.8
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: "1"
    ports:
      - "7658:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/init-sqs.sh:/etc/localstack/init/ready.d/init-sqs.sh:ro

volumes:
  postgres-data:
  minio-data:
  localstack-data:
